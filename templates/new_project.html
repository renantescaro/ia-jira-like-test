<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Projeto | ArchitectPro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans text-gray-900 min-h-screen flex flex-col">

    <nav class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <a href="/" class="flex items-center">
                    <i class="fas fa-cubes text-blue-600 text-2xl mr-2"></i>
                    <span class="text-xl font-bold tracking-tight text-gray-800">Architect<span class="text-blue-600">Pro</span></span>
                </a>
                
                <div class="flex items-center space-x-6">
                    <div class="hidden md:flex items-center text-sm text-gray-500">
                        <i class="fas fa-user-circle mr-2"></i>
                        <span class="font-medium">{{ current_user.username }}</span>
                    </div>

                    <a href="/logout" class="text-gray-400 hover:text-red-600 transition-colors duration-200 flex items-center text-sm font-semibold">
                        <i class="fas fa-sign-out-alt mr-1"></i> Sair
                    </a>

                    {% if request.endpoint == 'index' %}
                    <a href="/project/new" class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 transition shadow-sm">
                        <i class="fas fa-plus mr-2"></i> Novo
                    </a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-2xl shadow-xl border border-gray-100">
            
            <div class="text-center">
                <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-blue-100 mb-4">
                    <i class="fas fa-rocket text-blue-600 text-xl"></i>
                </div>
                <h2 class="text-3xl font-extrabold text-gray-900">Novo Projeto</h2>
                <p class="mt-2 text-sm text-gray-600">Defina o nome e o objetivo principal do seu software.</p>
            </div>

            <form class="mt-8 space-y-6" method="POST">
                <div class="rounded-md shadow-sm -space-y-px">
                    <div class="mb-4">
                        <label for="name" class="block text-sm font-semibold text-gray-700 mb-1">Nome do Projeto</label>
                        <input id="name" name="name" type="text" required 
                               class="appearance-none rounded-lg relative block w-full px-4 py-3 border border-gray-300 placeholder-gray-400 text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 sm:text-sm" 
                               placeholder="Ex: App de Logística v2.0">
                    </div>
                    
                    <div>
                        <label for="description" class="block text-sm font-semibold text-gray-700 mb-1">Descrição / Contexto Geral</label>
                        <textarea id="description" name="description" rows="4" required
                                  class="appearance-none rounded-lg relative block w-full px-4 py-3 border border-gray-300 placeholder-gray-400 text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 sm:text-sm" 
                                  placeholder="Descreva o que este software deve resolver..."></textarea>
                    </div>
                </div>

                <div>
                    <button type="submit" 
                            class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-bold rounded-lg text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-all duration-200 shadow-lg">
                        <span class="absolute left-0 inset-y-0 flex items-center pl-3 text-blue-500 group-hover:text-blue-400">
                            <i class="fas fa-check"></i>
                        </span>
                        Criar Projeto
                    </button>
                </div>
            </form>

            <div class="text-center">
                <p class="text-xs text-gray-400">
                    Ao criar, você poderá adicionar telas Web, Mobile e APIs específicas.
                </p>
            </div>
        </div>
    </main>

    <footer class="py-6 text-center text-gray-400 text-xs">
        &copy; 2026 ArchitectPro - Engineering Flow
    </footer>

</body>
</html>
